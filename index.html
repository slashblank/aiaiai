<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>dondools — AI Prompt Collection</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg: #ffffff;
    --text: #0a0a0a;
    --text-muted: #8a8a8a;
    --text-light: #b8b8b8;
    --border: #ececec;
    --border-strong: #0a0a0a;
  }
  
  body {
    font-family: "Helvetica Neue", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: #f3f3f3;
    color: var(--text);
    min-height: 100vh;
    line-height: 1.4;
    letter-spacing: -0.01em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  
  .container {
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
    min-height: 100vh;
    position: relative;
    box-shadow: 0 0 40px rgba(0,0,0,0.04);
  }
  
  /* Header */
  .header {
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 50;
    padding: 18px 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom: 1px solid var(--border);
    max-width: 480px;
    margin: 0 auto;
  }
  
  .logo {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.04em;
    font-style: italic;
  }
  
  .logo sup {
    font-size: 10px;
    font-weight: 700;
    font-style: normal;
    vertical-align: super;
    margin-left: 2px;
    letter-spacing: 0;
  }
  
  /* Hero / Intro */
  .intro {
    padding: 40px 20px 28px;
    border-bottom: 1px solid var(--border);
  }
  
  .intro-title {
    font-size: 28px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -0.035em;
    margin-bottom: 14px;
  }
  
  .intro-title em {
    font-style: italic;
    font-weight: 900;
  }
  
  .intro-title .copy-highlight {
    font-style: normal;
    background: #0000ff;
    color: #ffffff;
    padding: 0;
    display: inline-block;
    line-height: 1.1;
  }
  
  .intro-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.5;
    max-width: 480px;
  }
  
  /* Search */
  .search-wrap {
    padding: 20px;
    border-bottom: 1px solid var(--border);
  }
  
  .search-box {
    position: relative;
  }
  
  .search-box input {
    width: 100%;
    padding: 12px 32px 12px 24px;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid var(--text);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    outline: none;
    letter-spacing: -0.01em;
  }
  
  .search-box input::placeholder {
    color: var(--text-light);
    font-style: italic;
  }
  
  .search-box::before {
    content: "↗";
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    font-weight: 700;
  }
  
  .search-clear {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 22px;
    height: 22px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 0;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    line-height: 1;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background-color 0.15s ease;
  }
  
  .search-clear.visible {
    display: flex;
  }
  
  .search-clear:hover {
    background: #0000ff;
  }
  
  /* Category Tabs */
  .category-tabs {
    padding: 18px 20px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-bottom: 1px solid var(--border);
  }
  
  .category-tabs::-webkit-scrollbar { display: none; }
  
  .tab {
    flex-shrink: 0;
    padding: 7px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 0;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.02em;
  }
  
  .tab.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }
  
  /* Card List */
  .card-list {
    padding: 24px 20px 60px;
    display: flex;
    flex-direction: column;
    gap: 36px;
  }
  
  .card {
    cursor: pointer;
    display: block;
  }
  
  /* ===== 카드 썸네일 (2:1 비율) ===== */
  .card-image {
    width: 100%;
    aspect-ratio: 2 / 1;
    border-radius: 0;
    overflow: hidden;
    position: relative;
    margin-bottom: 14px;
    transition: opacity 0.2s;
  }
  
  .card:active .card-image {
    opacity: 0.85;
  }
  
  /* Gradient backgrounds */
  .gradient-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  
  .gradient-bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.15) 0%, transparent 50%);
    mix-blend-mode: overlay;
  }
  
  .custom-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
  }
  
  .grad-1 { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #ec4899 100%); }
  .grad-2 { background: linear-gradient(135deg, #f43f5e 0%, #8b5cf6 50%, #3b82f6 100%); }
  .grad-3 { background: linear-gradient(135deg, #0ea5e9 0%, #6366f1 50%, #d946ef 100%); }
  .grad-4 { background: linear-gradient(135deg, #f97316 0%, #ec4899 50%, #8b5cf6 100%); }
  .grad-5 { background: linear-gradient(135deg, #10b981 0%, #06b6d4 50%, #3b82f6 100%); }
  .grad-6 { background: linear-gradient(135deg, #eab308 0%, #f97316 50%, #ef4444 100%); }
  .grad-7 { background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #f97316 100%); }
  .grad-8 { background: linear-gradient(135deg, #06b6d4 0%, #8b5cf6 50%, #ec4899 100%); }
  
  .card-icon {
    position: absolute;
    bottom: 14px;
    left: 14px;
    width: 20px;
    height: 20px;
    z-index: 2;
    color: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .card-icon svg {
    width: 100%;
    height: 100%;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
  }
  
  .card-number {
    position: absolute;
    top: 14px;
    left: 14px;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.08em;
    z-index: 2;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  
  .card-category-img {
    position: absolute;
    top: 14px;
    right: 14px;
    font-size: 12px;
    font-weight: 700;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.1em;
    z-index: 2;
    text-transform: uppercase;
  }
  
  .card-meta {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 6px;
  }
  
  .card-title {
    font-size: 18px;
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.03em;
    text-transform: uppercase;
  }
  
  .card-desc {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.5;
    letter-spacing: -0.03em;
    font-style: italic;
    white-space: pre-wrap;
  }
  
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-light);
    font-size: 13px;
    font-style: italic;
  }
  
  /* Footer */
  .footer {
    border-top: 1px solid var(--border);
    padding: 30px 20px;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--text-muted);
  }
  
  /* Modal */
  body.modal-open {
    overflow: hidden;
  }
  
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    display: none;
    align-items: stretch;
    justify-content: center;
    animation: fadeIn 0.2s ease;
    overflow: hidden;
  }
  
  .modal-overlay.active {
    display: flex;
  }
  
  .modal {
    background: var(--bg);
    width: 100%;
    max-width: 480px;
    height: 100vh;
    height: 100dvh;
    max-height: none;
    border-radius: 0;
    display: flex;
    flex-direction: column;
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  
  .modal-top-bar {
    padding: 14px 20px;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  
  .modal-close-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text);
    transition: color 0.15s ease;
  }
  
  .modal-close-btn:hover {
    color: #0000ff;
  }
  
  .modal-close-btn svg {
    width: 17px;
    height: 17px;
    fill: currentColor;
  }
  
  .modal-hero {
    width: 100%;
    aspect-ratio: 16 / 9;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
    transition: aspect-ratio 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .modal-hero.compact {
    aspect-ratio: 32 / 9;
  }
  
  .modal-hero .gradient-bg {
    transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 20px;
    -webkit-overflow-scrolling: touch;
    transition: padding-bottom 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .modal-body.compact-padding {
    padding-bottom: 120px;
  }
  
  .modal-code {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    margin-bottom: 10px;
  }
  
  .modal-title {
    font-size: 23px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.05;
    letter-spacing: -0.03em;
    margin-bottom: 10px;
  }
  
  .modal-title em {
    font-style: italic;
  }
  
  .modal-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.55;
    margin-bottom: 28px;
    font-style: italic;
    letter-spacing: -0.01em;
    white-space: pre-wrap;
  }
  
  .modal-section {
    margin-bottom: 24px;
  }
  
  .modal-section:last-child {
    margin-bottom: 0;
  }
  
  .section-label {
    display: inline-block;
    font-size: 14px;
    font-weight: 900;
    letter-spacing: 0;
    color: #ffffff;
    background: #0a0a0a;
    padding: 4px 10px;
    margin-bottom: 12px;
  }
  
  .modal-usage {
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    letter-spacing: -0.005em;
  }
  
  .prompt-box {
    background: #f7f7f7;
    border: 1px solid var(--border);
    padding: 18px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    letter-spacing: -0.005em;
  }
  
  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  
  .modal-tag {
    display: inline-block;
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--text);
    font-size: 11px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.02em;
    transition: all 0.15s ease;
    cursor: default;
  }
  
  .modal-tag:hover {
    background: #0000ff;
    border-color: #0000ff;
    color: #fff;
  }
  
  .modal-footer {
    padding: 14px 20px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    background: var(--bg);
  }
  
  .btn {
    padding: 14px;
    border: none;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    position: relative;
  }
  
  .btn-primary {
    flex: 1;
    background: var(--text);
    color: var(--bg);
    border: 1px solid var(--text);
  }
  
  .btn-primary:hover {
    background: #0000ff;
    border-color: #0000ff;
  }
  
  .btn-primary:active {
    background: #2a2a2a;
  }
  
  .btn-secondary {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--text);
    flex: 0 0 auto;
    padding: 14px 20px;
  }
  
  .btn-secondary:hover {
    background: var(--bg);
    color: #0000ff;
    border-color: #0000ff;
  }
  
  .btn-secondary:active {
    background: #f0f0f0;
  }
  
  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text);
    color: var(--bg);
    padding: 12px 22px;
    border-radius: 0;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    z-index: 200;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    pointer-events: none;
  }
  
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  
  /* Floating Action Bar */
  .floating-bar {
    position: fixed;
    bottom: 24px;
    left: calc(max(0px, (100vw - 480px) / 2) + 20px);
    right: calc(max(0px, (100vw - 480px) / 2) + 20px);
    display: flex;
    gap: 8px;
    align-items: stretch;
    z-index: 60;
    opacity: 0;
    pointer-events: none;
    transform: translateY(20px);
    transition: opacity 0.25s cubic-bezier(0.16, 1, 0.3, 1),
                transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  }
  
  .floating-bar.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  
  .floating-search {
    flex: 1;
    background: #ffffff;
    border: 1px solid var(--text);
    display: flex;
    align-items: center;
    padding: 0 14px;
    height: 44px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
    transition: border-color 0.15s ease;
  }
  
  .floating-search:focus-within {
    border-color: #0000ff;
  }
  
  .floating-search::before {
    content: "↗";
    font-size: 13px;
    font-weight: 700;
    margin-right: 10px;
    color: var(--text);
  }
  
  .floating-search input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.01em;
    min-width: 0;
  }
  
  .floating-search input::placeholder {
    color: var(--text-light);
    font-style: italic;
  }
  
  .floating-search-clear {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 0;
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    line-height: 1;
    margin-left: 8px;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: background-color 0.15s ease;
  }
  
  .floating-search-clear.visible {
    display: flex;
  }
  
  .floating-search-clear:hover {
    background: #0000ff;
  }
  
  .top-btn {
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    background: #0a0a0a;
    color: #ffffff;
    border: none;
    border-radius: 0;
    cursor: pointer;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.15s ease, box-shadow 0.15s ease, transform 0.1s ease;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
  }
  
  .top-btn:hover {
    background: #0000ff;
    box-shadow: 0 6px 20px rgba(0, 0, 255, 0.35);
  }
  
  .top-btn:active {
    transform: scale(0.92);
  }
  
  .top-btn svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: square;
    stroke-linejoin: miter;
  }
</style>
</head>
<body>

<header class="header">
  <div class="logo">dondools<sup>™</sup></div>
</header>

<div class="container">

<section class="intro">
  <h1 class="intro-title">AI 활용도를 높이고<br>높은 퀄리티의 결과물을 위해<br><span class="copy-highlight">COPY</span>만 하세요.</h1>
  <p class="intro-desc">좋은 프롬프트를 사용하면 결과물이 달라집니다.<br>그냥 COPY만 하세요.</p>
</section>

<div class="search-wrap">
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="검색어를 입력하세요.">
    <button class="search-clear" id="searchClear" aria-label="검색어 지우기" type="button">✕</button>
  </div>
</div>

<div class="category-tabs" id="categoryTabs"></div>

<main class="card-list" id="cardList"></main>

<footer class="footer">
  © DONDOOLS COLLECTION — ALL PROMPTS CRAFTED WITH CARE
</footer>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-top-bar">
      <button class="modal-close-btn" id="modalCloseTriangle" aria-label="닫기">
        <svg viewBox="0 0 24 24"><polygon points="6 9, 18 9, 12 17"/></svg>
      </button>
    </div>
    <div class="modal-hero" id="modalHero"></div>
    <div class="modal-body">
      <div class="modal-code" id="modalCode"></div>
      <h2 class="modal-title" id="modalTitle"></h2>
      <p class="modal-desc" id="modalDesc"></p>
      
      <div class="modal-section">
        <div class="section-label">본문</div>
        <div class="modal-usage" id="modalUsage"></div>
      </div>
      
      <div class="modal-section">
        <div class="section-label">프롬프트</div>
        <div class="prompt-box" id="modalPrompt"></div>
      </div>
      
      <div class="modal-section">
        <div class="section-label">태그</div>
        <div class="modal-tags" id="modalTags"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" id="copyBtn">
        COPY PROMPT
      </button>
      <button class="btn btn-secondary" id="shareBtn">
        COPY URL
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✓ COPIED</div>

<div class="floating-bar" id="floatingBar">
  <div class="floating-search">
    <input type="text" id="floatingSearchInput" placeholder="검색어를 입력하세요.">
    <button class="floating-search-clear" id="floatingSearchClear" aria-label="검색어 지우기" type="button">✕</button>
  </div>
  <button class="top-btn" id="topBtn" aria-label="맨 위로">
    <svg viewBox="0 0 24 24"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>
  </button>
</div>

<script>
  // ====== 프롬프트 데이터 (prompts.json 파일에서 로드) ======
  let prompts = [];
  
  // 샘플 데이터
  const SAMPLE_DATA = {
    "prompts": [
      {
        "id": "26051401",
        "code": "100000",
        "category": "이미지 편집",
        "title": "이미지 속 피사체만 추출 (누끼 작업)",
        "description": "이미지속 피사체만 깔끔하게 추출합니다.\n포토샵 없이 간편하게 누끼 작업을 할 수 있습니다.",
        "usage": "1. 사진을 업로드합니다.\n2. 프롬프트를 복사+붙여넣기 합니다.\n3. [대상 피사체] 부분에 추출할 피사체를 입력합니다.\n4. 실행합니다.\n",
        "prompt": "대상 피사체: (대상 피사체를 입력하세요)\n\n[0. ROLE DEFINITION]\n이 명령은 '이미지 생성'이 아닌 '데이터 마스킹 및 추출' 작업이다.\n너는 창의성을 0%로 제한하고, 오직 원본의 픽셀을 흰색 배경으로 옮기는 '기계적 툴'로서만 작동한다.",
        "tags": "누끼작업,누끼따기,이미지편집,이미지,누끼",
        "published": "TRUE",
        "order": 1,
        "thumbnail_color": "",
        "thumbnail_icon": ""
      },
      {
        "id": "26051402",
        "code": "100001",
        "category": "분석",
        "title": "단색 배경 + 가위 아이콘 (샘플)",
        "description": "thumbnail_color에 단색 컬러 코드,\nthumbnail_icon에 'scissors'를 입력한 예시입니다.",
        "usage": "1. 시트의 thumbnail_color 컬럼에 색상 코드를 입력합니다.\n2. thumbnail_icon 컬럼에 사용 가능한 아이콘 키를 입력합니다.\n3. 입력값이 비어있으면 기본 그라데이션 + 카테고리 아이콘이 사용됩니다.",
        "prompt": "샘플 프롬프트 본문입니다.",
        "tags": "샘플,데모,컬러지정",
        "published": "TRUE",
        "order": 2,
        "thumbnail_color": "#0a0a0a",
        "thumbnail_icon": "scissors"
      },
      {
        "id": "26051403",
        "code": "100002",
        "category": "코딩",
        "title": "그라데이션 컬러 + 카메라 아이콘 (샘플)",
        "description": "thumbnail_color에 그라데이션도 입력 가능합니다.",
        "usage": "thumbnail_color 입력 예시: linear-gradient(135deg, #f43f5e, #8b5cf6)\nthumbnail_icon 입력 예시: camera",
        "prompt": "샘플 프롬프트 본문입니다.",
        "tags": "샘플,그라데이션,아이콘",
        "published": "TRUE",
        "order": 3,
        "thumbnail_color": "linear-gradient(135deg, #f43f5e 0%, #8b5cf6 100%)",
        "thumbnail_icon": "camera"
      }
    ]
  };
  
  function transformData(rawData) {
    const idCount = {};
    return (rawData.prompts || [])
      .filter(r => r.published === "TRUE" || r.published === true)
      .sort((a, b) => (parseInt(a.order, 10) || 999) - (parseInt(b.order, 10) || 999))
      .map(r => {
        const baseId = String(r.id || '').trim() || `auto-${Math.random().toString(36).slice(2, 8)}`;
        idCount[baseId] = (idCount[baseId] || 0) + 1;
        const uniqueId = idCount[baseId] === 1 ? baseId : `${baseId}-${idCount[baseId]}`;
        
        return {
          id: uniqueId,
          code: String(r.code || '').trim(),
          category: String(r.category || '').trim(),
          title: String(r.title || '').trim(),
          description: String(r.description || '').trim(),
          usage: String(r.usage || ''),
          prompt: String(r.prompt || ''),
          tags: r.tags ? String(r.tags).split(',').map(t => t.trim()).filter(Boolean) : [],
          thumbnail_color: String(r.thumbnail_color || '').trim(),
          thumbnail_icon: String(r.thumbnail_icon || '').trim()
        };
      });
  }
  
  async function loadPrompts() {
    try {
      const res = await fetch('./prompts.json?t=' + Date.now());
      if (!res.ok) throw new Error('prompts.json not found');
      const data = await res.json();
      const transformed = transformData(data);
      if (transformed.length === 0) {
        prompts = transformData(SAMPLE_DATA);
      } else {
        prompts = transformed;
      }
    } catch (e) {
      prompts = transformData(SAMPLE_DATA);
    }
  }
  // ================================================
  
  let currentCategory = "ALL";
  let currentSearch = "";
  
  const cardList = document.getElementById("cardList");
  const categoryTabs = document.getElementById("categoryTabs");
  const searchInput = document.getElementById("searchInput");
  const modalOverlay = document.getElementById("modalOverlay");
  const modalHero = document.getElementById("modalHero");
  const modalTitle = document.getElementById("modalTitle");
  const modalDesc = document.getElementById("modalDesc");
  const modalPrompt = document.getElementById("modalPrompt");
  const copyBtn = document.getElementById("copyBtn");
  const shareBtn = document.getElementById("shareBtn");
  const toast = document.getElementById("toast");
  
  function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
  
  function getGradClass(index) {
    return `grad-${(index % 8) + 1}`;
  }
  
  function normalizeColor(value) {
    if (!value) return null;
    const v = String(value).trim();
    if (!v) return null;
    if (/[;{}<>]/.test(v)) return null;
    return v;
  }
  
  function getCardBgHtml(p) {
    const customColor = normalizeColor(p.thumbnail_color);
    if (customColor) {
      return `<div class="custom-bg" style="background: ${customColor}"></div>`;
    }
    return `<div class="gradient-bg ${getGradClass(p._idx)}"></div>`;
  }
  
  const ICON_LIBRARY = {
    "image": `<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>`,
    "chart": `<svg viewBox="0 0 24 24"><path d="M3 3v18h18"/><path d="M7 16l4-6 4 3 5-7"/></svg>`,
    "pencil": `<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>`,
    "code": `<svg viewBox="0 0 24 24"><path d="m8 6-6 6 6 6"/><path d="m16 6 6 6-6 6"/><path d="m14 4-4 16"/></svg>`,
    "megaphone": `<svg viewBox="0 0 24 24"><path d="M3 11l18-8v18l-18-8z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/></svg>`,
    "bulb": `<svg viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.2 1 2v.3h6v-.3c0-.8.4-1.5 1-2A7 7 0 0 0 12 2Z"/></svg>`,
    "globe": `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15 15 0 0 1 0 20"/><path d="M12 2a15 15 0 0 0 0 20"/></svg>`,
    "document": `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8"/><path d="M8 17h5"/></svg>`,
    "star": `<svg viewBox="0 0 24 24"><polygon points="12 2 15 9 22 9 17 14 19 22 12 18 5 22 7 14 2 9 9 9"/></svg>`,
    "scissors": `<svg viewBox="0 0 24 24"><circle cx="6" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M20 4 8.12 15.88"/><path d="M14.47 14.48 20 20"/><path d="M8.12 8.12 12 12"/></svg>`,
    "camera": `<svg viewBox="0 0 24 24"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>`,
    "magic": `<svg viewBox="0 0 24 24"><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></svg>`,
    "search": `<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`,
    "data": `<svg viewBox="0 0 24 24"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14a9 3 0 0 0 18 0V5"/><path d="M3 12a9 3 0 0 0 18 0"/></svg>`,
    "settings": `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`
  };
  
  const CATEGORY_ICON_MAP = {
    "이미지 편집": "image",
    "분석": "chart",
    "글쓰기": "pencil",
    "코딩": "code",
    "마케팅": "megaphone",
    "기획": "bulb",
    "번역": "globe",
    "요약": "document"
  };
  
  function getCategoryIcon(category, iconKey) {
    if (iconKey && ICON_LIBRARY[iconKey]) {
      return ICON_LIBRARY[iconKey];
    }
    const defaultKey = CATEGORY_ICON_MAP[category];
    if (defaultKey && ICON_LIBRARY[defaultKey]) {
      return ICON_LIBRARY[defaultKey];
    }
    return ICON_LIBRARY["star"];
  }
  
  function renderCategories() {
    const categories = ["ALL", ...new Set(prompts.map(p => p.category))];
    categoryTabs.innerHTML = categories.map(cat => 
      `<button class="tab ${cat === currentCategory ? 'active' : ''}" data-category="${escapeHtml(cat)}">${escapeHtml(cat)}</button>`
    ).join("");
    
    categoryTabs.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        currentCategory = tab.dataset.category;
        renderCategories();
        renderCards();
      });
    });
  }
  
  function renderCards() {
    let filtered = prompts.map((p, idx) => ({ ...p, _idx: idx }));
    
    if (currentCategory !== "ALL") {
      filtered = filtered.filter(p => p.category === currentCategory);
    }
    
    if (currentSearch) {
      const s = currentSearch.toLowerCase();
      filtered = filtered.filter(p => 
        p.title.toLowerCase().includes(s) || 
        p.description.toLowerCase().includes(s) ||
        p.category.toLowerCase().includes(s) ||
        p.code.toLowerCase().includes(s) ||
        (p.tags && p.tags.some(t => t.toLowerCase().includes(s)))
      );
    }
    
    if (filtered.length === 0) {
      cardList.innerHTML = `<div class="empty-state">— NO RESULTS —</div>`;
      return;
    }
    
    cardList.innerHTML = filtered.map((p, i) => `
      <article class="card" data-id="${escapeHtml(p.id)}">
        <div class="card-image">
          ${getCardBgHtml(p)}
          <span class="card-icon">${getCategoryIcon(p.category, p.thumbnail_icon)}</span>
          <span class="card-number">${escapeHtml(p.code)}</span>
          <span class="card-category-img">${escapeHtml(p.category)}</span>
        </div>
        <div class="card-meta">
          <span class="card-title">${escapeHtml(p.title)}</span>
        </div>
        <div class="card-desc">${escapeHtml(p.description)}</div>
      </article>
    `).join("");
    
    cardList.querySelectorAll(".card").forEach(card => {
      card.addEventListener("click", () => openModal(card.dataset.id));
    });
  }
  
  function handleModalScroll() {
    const modalBody = document.querySelector(".modal-body");
    if (!modalBody) return;
    
    const top = modalBody.scrollTop;
    const isCompact = modalHero.classList.contains("compact");
    
    if (!isCompact && top > 5) {
      modalHero.classList.add("compact");
      modalBody.classList.add("compact-padding");
    } else if (isCompact && top <= 0) {
      modalHero.classList.remove("compact");
      modalBody.classList.remove("compact-padding");
    }
  }
  
  function openModal(id) {
    const idx = prompts.findIndex(x => x.id === id);
    if (idx === -1) return;
    const p = prompts[idx];
    
    document.getElementById("modalCode").textContent = p.code;
    modalTitle.textContent = p.title;
    modalDesc.textContent = p.description;
    document.getElementById("modalUsage").textContent = p.usage || "";
    modalPrompt.textContent = p.prompt;
    
    const tagsContainer = document.getElementById("modalTags");
    if (p.tags && p.tags.length > 0) {
      tagsContainer.innerHTML = p.tags.map(t => `<span class="modal-tag">#${escapeHtml(t)}</span>`).join("");
    } else {
      tagsContainer.innerHTML = "";
    }
    
    const heroBgHtml = normalizeColor(p.thumbnail_color)
      ? `<div class="custom-bg" style="background: ${normalizeColor(p.thumbnail_color)}"></div>`
      : `<div class="gradient-bg ${getGradClass(idx)}"></div>`;
    
    modalHero.innerHTML = `
      ${heroBgHtml}
      <span class="card-icon">${getCategoryIcon(p.category, p.thumbnail_icon)}</span>
      <span class="card-number">${escapeHtml(p.code)}</span>
      <span class="card-category-img">${escapeHtml(p.category)}</span>
    `;
    
    modalHero.classList.remove("compact");
    
    modalOverlay.classList.add("active");
    document.body.classList.add("modal-open");
    
    safeUpdateHash(id);
    
    copyBtn.dataset.prompt = p.prompt;
    shareBtn.dataset.id = id;
    
    const modalBody = document.querySelector(".modal-body");
    if (modalBody) {
      modalBody.scrollTop = 0;
      modalBody.classList.remove("compact-padding");
      modalBody.removeEventListener("scroll", handleModalScroll);
      modalBody.addEventListener("scroll", handleModalScroll, { passive: true });
    }
  }
  
  function safeUpdateHash(id) {
    const scrollY = window.scrollY || window.pageYOffset || document.documentElement.scrollTop || 0;
    
    try {
      if (id) {
        if (location.hash !== `#${id}`) {
          history.pushState({ id }, "", `#${id}`);
        }
      } else {
        if (location.hash) {
          history.replaceState(null, "", location.pathname + location.search);
        }
      }
    } catch (e) {
      try {
        if (id) {
          location.hash = id;
        }
      } catch (e2) {}
    }
    
    if (window.scrollY !== scrollY) {
      window.scrollTo(0, scrollY);
    }
  }
  
  function closeModal() {
    modalOverlay.classList.remove("active");
    document.body.classList.remove("modal-open");
    safeUpdateHash(null);
  }
  
  function showToast(message) {
    toast.textContent = message;
    toast.classList.add("show");
    setTimeout(() => toast.classList.remove("show"), 2000);
  }
  
  copyBtn.addEventListener("click", async () => {
    const text = copyBtn.dataset.prompt;
    try {
      await navigator.clipboard.writeText(text);
      showToast("✓ COPIED");
    } catch (e) {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      try {
        document.execCommand("copy");
        showToast("✓ COPIED");
      } catch (err) {
        showToast("FAILED");
      }
      document.body.removeChild(ta);
    }
  });
  
  shareBtn.addEventListener("click", async () => {
    const id = shareBtn.dataset.id;
    const url = `${location.origin}${location.pathname}#${id}`;
    
    if (navigator.share) {
      try {
        await navigator.share({ url, title: modalTitle.textContent });
      } catch (e) {
        try {
          await navigator.clipboard.writeText(url);
          showToast("✓ URL 복사됨");
        } catch (err) {}
      }
    } else {
      try {
        await navigator.clipboard.writeText(url);
        showToast("✓ URL 복사됨");
      } catch (e) {
        const ta = document.createElement("textarea");
        ta.value = url;
        ta.style.position = "fixed";
        ta.style.opacity = "0";
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand("copy");
          showToast("✓ URL 복사됨");
        } catch (err) {
          showToast("복사 실패");
        }
        document.body.removeChild(ta);
      }
    }
  });
  
  const searchClear = document.getElementById("searchClear");
  const floatingSearchClear = document.getElementById("floatingSearchClear");
  const topBtn = document.getElementById("topBtn");
  const floatingBar = document.getElementById("floatingBar");
  const floatingSearchInput = document.getElementById("floatingSearchInput");
  
  function updateClearButtons(value) {
    if (value && value.length > 0) {
      searchClear.classList.add("visible");
      floatingSearchClear.classList.add("visible");
    } else {
      searchClear.classList.remove("visible");
      floatingSearchClear.classList.remove("visible");
    }
  }
  
  function clearSearch() {
    currentSearch = "";
    searchInput.value = "";
    floatingSearchInput.value = "";
    updateClearButtons("");
    renderCards();
  }
  
  searchClear.addEventListener("click", () => {
    clearSearch();
    searchInput.focus();
  });
  
  floatingSearchClear.addEventListener("click", () => {
    clearSearch();
    floatingSearchInput.focus();
  });
  
  function updateFloatingBar() {
    if (window.scrollY > 400) {
      floatingBar.classList.add("visible");
    } else {
      floatingBar.classList.remove("visible");
    }
  }
  
  window.addEventListener("scroll", updateFloatingBar, { passive: true });
  
  topBtn.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
  });
  
  floatingSearchInput.addEventListener("input", (e) => {
    currentSearch = e.target.value;
    searchInput.value = e.target.value;
    updateClearButtons(e.target.value);
    renderCards();
  });
  
  document.getElementById("modalCloseTriangle").addEventListener("click", closeModal);
  
  searchInput.addEventListener("input", (e) => {
    currentSearch = e.target.value;
    floatingSearchInput.value = e.target.value;
    updateClearButtons(e.target.value);
    renderCards();
  });
  
  window.addEventListener("popstate", () => {
    const hash = location.hash.slice(1);
    if (hash) {
      openModal(hash);
    } else {
      modalOverlay.classList.remove("active");
      document.body.classList.remove("modal-open");
    }
  });
  
  (async function init() {
    cardList.innerHTML = `<div class="empty-state">불러오는 중...</div>`;
    await loadPrompts();
    renderCategories();
    renderCards();
    
    if (location.hash) {
      const id = location.hash.slice(1);
      if (prompts.find(p => p.id === id)) {
        openModal(id);
      }
    }
  })();
</script>
</body>
</html>
